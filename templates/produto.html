{% extends "layout.html" %}

{% block title %}
{{ produto.nome }}
{% endblock %}

{% block main %}
<style>
    /* Layout Principal da Página do Produto */
    #theproduto {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 40px;
        align-items: start;
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.1);
        border-radius: 32px;
        padding: 32px;
        backdrop-filter: blur(12px);
    }

    /* Container de Imagem e Botão de Próxima */
    #divimg {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
    }

    #imagem {
        width: 100%;
        max-height: 500px;
        object-fit: cover;
        border-radius: 24px;
        border: 1px solid rgba(148, 163, 184, 0.15);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        transition: transform 0.3s ease;
    }

    /* Botão de Próxima Imagem (Estilo Flutuante Elegante) */
    #proxima {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        backdrop-filter: blur(5px);
        transition: all 0.25s ease;
    }

    #proxima:hover {
        background: var(--primary);
        border-color: var(--primary);
        transform: translateY(-50%) scale(1.05);
    }

    #proxima img {
        height: 20px;
        filter: invert(1); /* Ajusta a seta preta para branco no tema escuro */
    }

    /* Miniaturas posicionadas abaixo da imagem principal */
    #miniaturas {
        grid-column: 1; /* Mantém na coluna da imagem */
        display: flex;
        gap: 12px;
        margin-top: 16px;
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 8px;
    }

    .miniatura {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 12px;
        cursor: pointer;
        border: 2px solid transparent;
        background: rgba(255, 255, 255, 0.05);
        transition: all 0.2s ease;
    }

    .miniatura:hover {
        border-color: var(--primary);
        transform: translateY(-2px);
    }

    /* Bloco de Informações do Produto */
    #info {
        display: flex;
        flex-direction: column;
        gap: 24px;
    }

    #nome {
        font-size: 2.5rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        line-height: 1.2;
        color: #f8fafc;
        margin: 0;
    }

    #precos {
        background: rgba(56, 189, 248, 0.06);
        border: 1px solid rgba(56, 189, 248, 0.15);
        padding: 16px 24px;
        border-radius: 16px;
        display: inline-block;
        align-self: flex-start;
    }

    #preco {
        font-size: 1.8rem;
        font-weight: 700;
        color: var(--primary);
        margin: 0;
    }

    #descricao {
        font-size: 1.05rem;
        line-height: 1.7;
        color: var(--muted);
        margin: 0;
    }

    /* Seção de Modelos / Cores */
    #cores {
        display: flex;
        flex-direction: column;
        gap: 12px;
        border-top: 1px solid rgba(148, 163, 184, 0.1);
        padding-top: 20px;
    }

    #cores h4 {
        margin: 0;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        color: var(--muted);
    }

    /* Alinha os botões de cores lado a lado */
    #cores p {
        margin: 0;
        display: inline-block;
    }
    
    #cores div.container-botoes {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .cores {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text);
        border: 1px solid rgba(148, 163, 184, 0.15);
        border-radius: 12px;
        padding: 12px 20px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .cores:hover {
        border-color: var(--primary);
        background: rgba(56, 189, 248, 0.05);
    }

    .cores.ativo {
        background: var(--primary);
        color: var(--bg);
        border-color: var(--primary);
        box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
    }

    /* Formulários e Botões de Ação (Carrinho e Comprar) */
    #carrinho form, form {
        width: 100%;
    }

    /* Botão Adicionar ao Carrinho */
    #carrinho button.cores {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        background: transparent;
        border: 2px solid var(--primary);
        color: var(--primary);
        border-radius: 999px;
        padding: 16px;
        font-size: 1.1rem;
        font-weight: 700;
        transition: all 0.25s ease;
    }

    #carrinho button.cores:hover {
        background: var(--primary);
        color: var(--bg);
        transform: translateY(-2px);
    }

    #carrinho button.cores #add {
        margin: 0;
        font-size: 1.1rem;
        font-weight: 700;
        color: inherit;
    }

    #carrinho button.cores img.carrinho {
        width: 24px;
        height: 24px;
        filter: currentColor; /* Faz o ícone herdar a cor do texto do botão */
    }

    /* Botão Comprar Agora */
    .comprar {
        width: 100%;
        padding: 18px;
        border-radius: 999px;
        background: var(--accent) !important; /* Usa o verde de destaque da sua paleta */
        color: #fff;
        font-size: 1.15rem;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: all 0.25s ease;
        box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
    }

    .comprar:hover {
        background: #16a34a !important; /* Verde um pouco mais escuro no hover */
        transform: translateY(-2px);
        box-shadow: 0 15px 25px rgba(34, 197, 94, 0.3);
    }

    /* Responsividade para Tablets e Celulares */
    @media (max-width: 980px) {
        #theproduto {
            grid-template-columns: 1fr;
            gap: 32px;
            padding: 20px;
        }
        
        #miniaturas {
            grid-column: auto;
            justify-content: center;
        }

        #nome {
            font-size: 2rem;
        }
    }
</style>
<div id="theproduto">
    <div id="divimg">
        <img class="imagem" id="imagem" src="/static/produtos/{{ produto.imagens.split(',')[0]|replace(' ', '') }}" alt="Imagem do produto">
        <button id="proxima"><img src="/static/seta.png" height="40px"></button>
    </div>



    <div id="info">
        <h2 id="nome">{{ produto.nome }}</h2>
        <div id="precos">
            <h3 id="preco">Preço: R${{ precos[0] }}</h3>
        <p id="descricao">{{ produto.descricao }}</p>

        <div id="cores">
            <h4>Modelos:</h4>
            {% for cor in cores %}
                <p><button class="cores" id="cor{{ loop.index }}" onclick="mostrarPreco({{ loop.index }})">{{ cor }}</button></p>
            {% endfor %}
        </div>
        <div id="carrinho">
            <form method="get" action="/adicionar_carrinho">
                <input type="hidden" name="produto_id" value="{{ produto.id }}">
                <input type="hidden" name="cor" id="cor_selecionada" value="">
                <input type="hidden" name="preco" id="preco_selecionado" value="">
        
                <button class="cores" type="submit">
                    <h4 id="add">Adicionar ao Carrinho</h4>
                    <img class="carrinho" src="https://img.icons8.com/?size=100&id=47623&format=png&color=000000" alt="Carrinho">
                </button>
            </form>
        </div>
        
        <form method="get">
            <input type="hidden" name="produto_id" value="{{ produto.id }}">
            <input type="hidden" name="cor" id="cor_selecionada_buy" value="">
            <input type="hidden" name="preco" id="preco_selecionado_buy" value="">
        
            <button class="comprar" value="{{ produto.id }}" name="buy">Comprar Agora</button>
        </form>
        
        
        
        
</div>
   
    
     <!-- Miniaturas -->
     <div id="miniaturas">
        {% for imagem in produto.imagens.split(',') %}
            <img class="miniatura" src="/static/produtos/{{ imagem|replace(' ', '') }}" onclick="trocarImagem('{{ imagem|replace(' ', '') }}')">
        {% endfor %}
    </div>
    <script>
        const precos = {{ precos|tojson }};
        const imagens = {{ produto.imagens.split(',')|tojson }}.map(img => img.trim());
        let index = 0;
        let botaoAtivo = null;
    
        document.getElementById("proxima").addEventListener("click", function() {
            index = (index + 1) % imagens.length;
            document.getElementById("imagem").src = "/static/produtos/" + imagens[index];
        });
    
        function mostrarPreco(corId) {
            document.getElementById("preco").innerText = "Preço: R$" + precos[corId - 1];
    
            if (botaoAtivo) {
                botaoAtivo.classList.remove("ativo");
            }
    
            botaoAtivo = document.getElementById("cor" + corId);
            botaoAtivo.classList.add("ativo");
    
            // Atualiza os campos ocultos dos dois formulários
            document.getElementById("cor_selecionada").value = botaoAtivo.innerText.trim();
            document.getElementById("preco_selecionado").value = precos[corId - 1];
    
            document.getElementById("cor_selecionada_buy").value = botaoAtivo.innerText.trim();
            document.getElementById("preco_selecionado_buy").value = precos[corId - 1];
        }
    
        function trocarImagem(src) {
            document.getElementById("imagem").src = "/static/produtos/" + src;
        }
    </script>

{% endblock %}
