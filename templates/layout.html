<!DOCTYPE html>
<html lang="pt">

<head>
    <meta name="viewport" content="initial-scale=1, width=device-width">
    <title>{% block title %}{% endblock %}</title>
    <link href="/static/styles.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">

    <style>
        :root {
            --bg: #0f172a;
            --bg-soft: #111827;
            --surface: rgba(15, 23, 42, 0.95);
            --surface-soft: rgba(15, 23, 42, 0.85);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --accent: #22c55e;
            --border: rgba(148, 163, 184, 0.2);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: var(--text);
        }

        body {
            display: flex;
            flex-direction: column;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(10px);
        }

        .header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 18px 24px;
        }

        .header-content {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand img {
            width: 56px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background: rgba(255, 255, 255, 0.06);
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .brand-title {
            margin: 0;
            font-size: 1.15rem;
            letter-spacing: 0.02em;
            color: #f8fafc;
        }

        .brand-subtitle {
            margin: 0;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        #barra_pesquisa {
            display: flex;
            gap: 10px;
            flex: 1 1 320px;
            max-width: 540px;
        }

        #barra_pesquisa input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text);
        }

        #barra_pesquisa input[type="text"]::placeholder {
            color: rgba(226, 232, 240, 0.6);
        }

        #barra_pesquisa button,
        .button-primary,
        .comprar,
        .login-button,
        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 999px;
            background: var(--primary);
            color: var(--bg);
            cursor: pointer;
            transition: background 0.25s ease, transform 0.25s ease;
            font-weight: 700;
        }

        #barra_pesquisa button:hover,
        .button-primary:hover,
        .comprar:hover,
        .login-button:hover,
        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .carrinho {
            width: 42px;
            filter: drop-shadow(0 0 0.5rem rgba(56, 189, 248, 0.2));
        }

        main {
            width: 100%;
            max-width: 1200px;
            margin: 32px auto;
            padding: 0 20px 30px;
            flex: 1;
        }

        footer {
            text-align: center;
            color: var(--muted);
            font-size: 0.95rem;
            padding: 20px 20px 30px;
        }

        .section-card,
        .boxed,
        .checkout-container,
        .pix-container,
        .item,
        .produtos,
        .auth-form,
        .contact-item,
        .login-form,
        .pix-container,
        .error-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
        }

        .feature-card {
            padding: 24px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 24px;
        }

        .produtos-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .produtos {
            padding: 22px;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            overflow: hidden;
        }

        .produtos:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        .product-detail-grid {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 32px;
            align-items: start;
        }

        .product-gallery,
        .product-details {
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 32px;
            padding: 28px;
        }

        .product-image-card {
            display: grid;
            gap: 18px;
        }

        .product-image-card img {
            width: 100%;
            border-radius: 28px;
            object-fit: cover;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        .thumbnails {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 12px;
        }

        .thumb-button {
            border: none;
            background: transparent;
            padding: 0;
            cursor: pointer;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.12);
        }

        .thumb-button img {
            width: 100%;
            display: block;
            border-radius: 18px;
        }

        .product-head {
            display: grid;
            gap: 10px;
            margin-bottom: 24px;
        }

        .product-sku {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .product-title {
            margin: 0;
            font-size: clamp(2rem, 2.4vw, 3rem);
            line-height: 1.05;
        }

        .product-meta {
            display: grid;
            gap: 18px;
            margin-bottom: 28px;
        }

        .product-price {
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
        }

        .price-current {
            font-size: 1.2rem;
            color: var(--text);
        }

        .price-value {
            font-size: 2.6rem;
        }

        .product-description {
            color: var(--muted);
            line-height: 1.8;
            max-width: 94%;
        }

        .product-actions {
            display: grid;
            gap: 26px;
        }

        .product-options {
            display: grid;
            gap: 20px;
        }

        .option-group {
            display: grid;
            gap: 12px;
        }

        .option-label {
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .color-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .price-badge {
            display: inline-flex;
            align-items: center;
            padding: 14px 18px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-weight: 700;
        }

        .product-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
        }

        .action-form {
            width: 100%;
        }

        .product-buttons .button-secondary {
            width: 100%;
            justify-content: center;
        }

        .cores {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 18px;
            background: rgba(56, 189, 248, 0.08);
            color: var(--text);
            cursor: pointer;
            transition: background 0.25s ease, transform 0.2s ease;
        }

        .cores:hover,
        .cores.ativo {
            background: rgba(56, 189, 248, 0.22);
            transform: translateY(-1px);
        }

        @media (max-width: 980px) {
            .product-detail-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 640px) {
            .product-detail-grid {
                gap: 18px;
            }

            .product-buttons {
                flex-direction: column;
            }

            .product-price {
                font-size: 2rem;
            }
        }

        .nome,
        .item-name,
        .title,
        .page-title,
        .pix-title,
        .checkout-title,
        .section-title {
            color: #f8fafc;
        }

        .preco,
        .item-price,
        .item-price h3 {
            color: var(--primary);
            font-weight: 700;
        }

        .button-secondary,
        .login-link,
        .cta-button,
        .contact-link {
            color: var(--primary);
        }

        .login-link:hover,
        .contact-link:hover {
            text-decoration: underline;
        }

        .login-container,
        .checkout-container,
        .pix-container,
        .error-card,
        .product-panel {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 28px;
            display: flex;
            justify-content: center; /* Centraliza na horizontal */
        }

        .login-form {
            width: 100%;
            max-width: 420px;
            display: grid;
            gap: 16px;
        }

        .login-input,
        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
        }

        input::placeholder,
        textarea::placeholder {
            color: rgba(226, 232, 240, 0.6);
        }

        .form-group {
            display: grid;
            gap: 8px;
        }

        label {
            color: var(--text);
            font-weight: 600;
        }

        .item {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 16px;
            padding: 18px;
        }

        .item-image {
            width: 100px;
            min-width: 100px;
            border-radius: 18px;
            object-fit: cover;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .item-name {
            margin: 0;
            font-size: 1rem;
        }

        .item-price {
            margin: 0;
            font-size: 1rem;
        }

        .product-panel {
            display: grid;
            gap: 24px;
            padding: 24px;
        }

        #theproduto {
            display: grid;
            gap: 28px;
        }

        #divimg {
            position: relative;
            display: grid;
            justify-items: center;
            gap: 16px;
        }

        #imagem {
            width: 100%;
            max-width: 540px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
        }

        #info {
            display: grid;
            gap: 18px;
        }

        #nome {
            margin: 0;
            font-size: 2rem;
        }

        #precos {
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        #preco {
            font-size: 2rem;
            margin: 0;
            color: var(--primary);
        }

        #descricao {
            line-height: 1.8;
            color: var(--muted);
        }

        #cores {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .cores {
            background: rgba(56, 189, 248, 0.12);
            color: var(--text);
            border: 1px solid rgba(56, 189, 248, 0.25);
            border-radius: 999px;
            padding: 10px 18px;
            cursor: pointer;
            transition: background 0.25s ease;
        }

        .cores:hover,
        .cores.ativo {
            background: rgba(56, 189, 248, 0.25);
        }

        #carrinho button,
        .comprar {
            width: 100%;
        }

        #miniaturas {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 12px;
        }

        .miniatura {
            width: 100%;
            border-radius: 18px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.25s ease;
        }

        .miniatura:hover {
            border-color: var(--primary);
        }

        .footer-link {
            max-width: 1200px;
            margin: 0 auto;
        }

        .page-title {
            margin-bottom: 24px;
            font-size: 2.2rem;
            text-align: center;
        }

        .subtitle {
            margin: 0 0 24px;
            text-align: center;
            color: var(--muted);
        }

        .checkout-container,
        .pix-container,
        .error-card,
        .login-container {
            background: rgba(15, 23, 42, 0.92);
        }

        .contact-item {
            padding: 18px;
        }

        .contact-item strong {
            color: #f8fafc;
        }

        .cta-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 999px;
            background: var(--primary);
            color: var(--bg);
            font-weight: 700;
            transition: background 0.25s ease;
        }

        .cta-button:hover {
            background: var(--primary-hover);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                align-items: stretch;
            }

            .brand {
                width: 100%;
            }

            #barra_pesquisa {
                width: 100%;
            }

            .item {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .item-image {
                margin: 0 auto;
            }

            #precos {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .header {
                padding: 16px;
            }

            .brand-title {
                font-size: 1rem;
            }

            .cta-button,
            .button-primary,
            .comprar,
            .btn-submit {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="header">
            <div class="header-content">
                <div class="brand">
                    <a href="/">
                        <img id="logo" src="/static/logo.png" alt="MineMyBot logo">
                    </a>
                    <div class="brand-text">
                        <h1 class="brand-title">MineMyBot</h1>
                        <p class="brand-subtitle">Robôs inteligentes para seu server de Mine</p>
                    </div>
                </div>

                <div class="header-actions">
                    <a href="/logout" class="button-secondary">Logout</a>
                    <a href="/carrinho"><img class="carrinho" src="https://img.icons8.com/?size=100&id=47623&format=png&color=ffffff" alt="Carrinho"></a>
                </div>
            </div>
{% block pesquisa %}{% endblock %}
        </div>
    </header>

    <main>
        {% block main %}{% endblock %}
    </main>

    <footer>
        <div class="footer-link">
            <p>MineMyBot © 2026 - Crie, programe e envie seus robôs para o server de Mine.</p>
        </div>
    </footer>
</body>

</html>
